<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kompass</title>
    <style>
      :root {
        --bg: #0f1117;
        --panel: #171923;
        --panel2: #1e2230;
        --border: #2a2f3f;
        --text: #e6e8ee;
        --dim: #8b91a3;
        --accent: #6c8cff;
        --accent2: #8b6cff;
        --ok: #34d399;
        --err: #f87171;
        --warn: #fbbf24;
        --user-bubble: #232a3f;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        font:
          14px/1.55 -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        overflow: hidden;
      }
      /* ---- sidebar ---- */
      #sidebar {
        width: 260px;
        min-width: 260px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 14px 12px;
        gap: 12px;
      }
      #logo {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.3px;
        padding: 2px 6px;
      }
      #logo span {
        color: var(--accent);
      }
      #logo small {
        display: block;
        color: var(--dim);
        font-weight: 400;
        font-size: 11px;
        margin-top: 2px;
      }
      #newBtn {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border: 0;
        padding: 9px 12px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
      }
      #newBtn:hover {
        filter: brightness(1.1);
      }
      #modes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .mode {
        background: var(--panel2);
        border: 1px solid var(--border);
        color: var(--dim);
        padding: 8px 6px;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
        font-size: 12.5px;
        user-select: none;
      }
      .mode.active {
        border-color: var(--accent);
        color: var(--text);
        background: #232a44;
      }
      .mode .ico {
        font-size: 16px;
        display: block;
        margin-bottom: 2px;
      }
      #sessions {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      #sessions h4 {
        color: var(--dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin: 6px 6px 4px;
      }
      .sess {
        padding: 7px 9px;
        border-radius: 7px;
        cursor: pointer;
        color: var(--dim);
        font-size: 12.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        position: relative;
      }
      .sess:hover {
        background: var(--panel2);
        color: var(--text);
      }
      .sess.active {
        background: var(--panel2);
        color: var(--text);
      }
      .sess .del {
        position: absolute;
        right: 6px;
        top: 6px;
        display: none;
        color: var(--dim);
      }
      .sess:hover .del {
        display: inline;
      }
      .sess .del:hover {
        color: var(--err);
      }
      .sess .m {
        font-size: 10px;
        color: var(--accent);
        margin-right: 5px;
        text-transform: uppercase;
      }
      #quota {
        border-top: 1px solid var(--border);
        padding-top: 10px;
        font-size: 11.5px;
        color: var(--dim);
      }
      #quota .row {
        display: flex;
        justify-content: space-between;
        margin: 2px 0;
      }
      #quota .bar {
        height: 3px;
        background: var(--panel2);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 5px;
      }
      #quota .bar i {
        display: block;
        height: 100%;
        background: var(--accent);
      }
      /* ---- main ---- */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      #thread {
        flex: 1;
        overflow-y: auto;
        padding: 26px 0 10px;
      }
      #thread .inner {
        max-width: 820px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #empty {
        text-align: center;
        margin-top: 16vh;
        color: var(--dim);
      }
      #empty h2 {
        color: var(--text);
        font-size: 22px;
        margin-bottom: 6px;
      }
      #empty .hints {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 22px;
        flex-wrap: wrap;
      }
      #empty .hint {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 12.5px;
        cursor: pointer;
        max-width: 220px;
      }
      #empty .hint:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-bubble);
        border-radius: 14px 14px 4px 14px;
        padding: 10px 14px;
        max-width: 78%;
        white-space: pre-wrap;
      }
      .msg.assistant {
        max-width: 100%;
      }
      .md h1,
      .md h2,
      .md h3 {
        margin: 14px 0 6px;
        line-height: 1.3;
      }
      .md h1 {
        font-size: 20px;
      }
      .md h2 {
        font-size: 17px;
      }
      .md h3 {
        font-size: 15px;
      }
      .md p {
        margin: 7px 0;
      }
      .md ul,
      .md ol {
        margin: 6px 0 6px 22px;
      }
      .md li {
        margin: 3px 0;
      }
      .md code {
        background: var(--panel2);
        padding: 1.5px 5px;
        border-radius: 4px;
        font:
          12.5px ui-monospace,
          Menlo,
          monospace;
      }
      .md pre {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 12px;
        overflow-x: auto;
        margin: 9px 0;
      }
      .md pre code {
        background: none;
        padding: 0;
      }
      .md a {
        color: var(--accent);
      }
      .md blockquote {
        border-left: 3px solid var(--border);
        padding-left: 12px;
        color: var(--dim);
        margin: 8px 0;
      }
      .md table {
        border-collapse: collapse;
        margin: 8px 0;
      }
      .md th,
      .md td {
        border: 1px solid var(--border);
        padding: 5px 10px;
        font-size: 13px;
      }
      /* tool cards */
      .tool {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        font-size: 12.5px;
      }
      .tool summary {
        padding: 8px 12px;
        cursor: pointer;
        color: var(--dim);
        display: flex;
        align-items: center;
        gap: 8px;
        list-style: none;
      }
      .tool summary::-webkit-details-marker {
        display: none;
      }
      .tool .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--warn);
      }
      .tool.ok .dot {
        background: var(--ok);
      }
      .tool.err .dot {
        background: var(--err);
      }
      .tool .tname {
        color: var(--text);
        font-weight: 600;
      }
      .tool .thint {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 480px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11.5px;
      }
      .tool pre {
        margin: 0;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        max-height: 300px;
        overflow: auto;
        font:
          11.5px ui-monospace,
          Menlo,
          monospace;
        color: var(--dim);
        white-space: pre-wrap;
      }
      .dl {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        padding: 9px 16px;
        border-radius: 9px;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        margin: 4px 0;
      }
      /* approval */
      .approval {
        background: #251f10;
        border: 1px solid #5c4a1a;
        border-radius: 10px;
        padding: 12px 14px;
      }
      .approval .q {
        color: var(--warn);
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .approval pre {
        background: var(--panel);
        border-radius: 7px;
        padding: 9px;
        margin: 6px 0 10px;
        font:
          11.5px ui-monospace,
          Menlo,
          monospace;
        white-space: pre-wrap;
        max-height: 180px;
        overflow: auto;
      }
      .approval button {
        border: 0;
        border-radius: 7px;
        padding: 7px 16px;
        font-weight: 600;
        cursor: pointer;
        margin-right: 8px;
        font-size: 12.5px;
      }
      .approval .yes {
        background: var(--ok);
        color: #06281c;
      }
      .approval .no {
        background: var(--panel2);
        color: var(--text);
      }
      .approval.resolved {
        opacity: 0.55;
      }
      .approval.resolved button {
        display: none;
      }
      .status-line {
        color: var(--dim);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .errbox {
        background: #2a1215;
        border: 1px solid #5c2a2e;
        color: var(--err);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
      }
      /* composer */
      #composer {
        border-top: 1px solid var(--border);
        padding: 14px 24px 18px;
        background: var(--bg);
      }
      #composer .inner {
        max-width: 820px;
        margin: 0 auto;
      }
      #wsRow {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--dim);
      }
      #wsRow input[type='text'] {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 7px;
        padding: 6px 10px;
        font:
          12px ui-monospace,
          Menlo,
          monospace;
      }
      #inputWrap {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
      }
      #inputWrap:focus-within {
        border-color: var(--accent);
      }
      #input {
        flex: 1;
        background: none;
        border: 0;
        color: var(--text);
        resize: none;
        outline: none;
        font: 14px/1.5 inherit;
        max-height: 200px;
      }
      #send {
        background: var(--accent);
        border: 0;
        color: #fff;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        cursor: pointer;
        font-size: 15px;
        flex-shrink: 0;
      }
      #send:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #modeTag {
        font-size: 11px;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 20px;
        padding: 2px 10px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div id="logo">⨁ Kom<span>pass</span><small>free-model workbench</small></div>
      <button id="newBtn">＋ New session</button>
      <div id="modes">
        <div class="mode active" data-mode="chat"><span class="ico">💬</span>Chat</div>
        <div class="mode" data-mode="agentic"><span class="ico">🛠️</span>Agent</div>
        <div class="mode" data-mode="research"><span class="ico">🔎</span>Research</div>
        <div class="mode" data-mode="slides"><span class="ico">📊</span>Slides</div>
      </div>
      <div id="sessions">
        <h4>Sessions</h4>
        <div id="sessList"></div>
      </div>
      <div id="quota">loading quota…</div>
    </div>

    <div id="main">
      <div id="thread"><div class="inner" id="threadInner"></div></div>
      <div id="composer">
        <div class="inner">
          <div id="wsRow" style="display: none">
            <span>workspace</span><input type="text" id="workspace" spellcheck="false" />
            <label><input type="checkbox" id="autoApprove" /> auto-approve</label>
          </div>
          <div id="inputWrap">
            <span id="modeTag">chat</span>
            <textarea id="input" rows="1" placeholder="Message Kompass…"></textarea>
            <button id="send">➤</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const $ = (id) => document.getElementById(id);
        let mode = 'chat',
          sessionId = null,
          busy = false;

        const HINTS = {
          chat: [
            'Explain how JWT auth works',
            'Draft a polite deadline-extension email',
            'Compare SQLite vs Postgres for a side project',
          ],
          agentic: [
            'Fix the failing tests in this repo',
            'Add a /healthz endpoint to the backend',
            'Refactor utils.py and verify with pytest',
          ],
          research: [
            'Research: best free LLM APIs in 2026',
            'Compare EU vs US data-privacy rules for SaaS',
            'What changed in React 19?',
          ],
          slides: [
            'Deck: intro to data mesh, 8 slides',
            'Pitch deck outline for a home-energy app',
            'Slides: Q3 marketplace metrics story',
          ],
        };

        // ---- tiny markdown renderer ----
        const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        function md(src) {
          const codes = [];
          src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            codes.push(`<pre><code>${esc(code.replace(/\n$/, ''))}</code></pre>`);
            return `\x00${codes.length - 1}\x00`;
          });
          const lines = src.split('\n');
          let html = '',
            inUl = false,
            inOl = false,
            inBq = false;
          const closeLists = () => {
            if (inUl) {
              html += '</ul>';
              inUl = false;
            }
            if (inOl) {
              html += '</ol>';
              inOl = false;
            }
            if (inBq) {
              html += '</blockquote>';
              inBq = false;
            }
          };
          const inline = (s) =>
            esc(s)
              .replace(/`([^`]+)`/g, '<code>$1</code>')
              .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
              .replace(/(^|\W)\*([^*\n]+)\*(?=\W|$)/g, '$1<em>$2</em>')
              .replace(
                /\[([^\]]+)\]\((https?:[^)\s]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener">$1</a>',
              );
          for (const line of lines) {
            const h = line.match(/^(#{1,3})\s+(.*)/);
            if (h) {
              closeLists();
              html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`;
              continue;
            }
            if (/^\s*[-*]\s+/.test(line)) {
              if (!inUl) {
                closeLists();
                html += '<ul>';
                inUl = true;
              }
              html += `<li>${inline(line.replace(/^\s*[-*]\s+/, ''))}</li>`;
              continue;
            }
            if (/^\s*\d+\.\s+/.test(line)) {
              if (!inOl) {
                closeLists();
                html += '<ol>';
                inOl = true;
              }
              html += `<li>${inline(line.replace(/^\s*\d+\.\s+/, ''))}</li>`;
              continue;
            }
            if (/^>\s?/.test(line)) {
              if (!inBq) {
                closeLists();
                html += '<blockquote>';
                inBq = true;
              }
              html += inline(line.replace(/^>\s?/, '')) + '<br>';
              continue;
            }
            closeLists();
            if (line.trim() === '') continue;
            if (/^\x00\d+\x00$/.test(line.trim())) {
              html += line.trim();
              continue;
            }
            html += `<p>${inline(line)}</p>`;
          }
          closeLists();
          return html.replace(/\x00(\d+)\x00/g, (_, i) => codes[+i]);
        }

        // ---- thread rendering ----
        const thread = $('threadInner');
        function el(html) {
          const d = document.createElement('div');
          d.innerHTML = html;
          return d.firstElementChild;
        }
        function scrollDown() {
          $('thread').scrollTop = $('thread').scrollHeight;
        }
        function addUser(text) {
          thread.appendChild(el(`<div class="msg user"></div>`)).textContent = text;
          scrollDown();
        }
        function addAssistant(text) {
          const n = el(`<div class="msg assistant"><div class="md"></div></div>`);
          n.querySelector('.md').innerHTML = md(text);
          thread.appendChild(n);
          scrollDown();
        }
        function addError(text) {
          thread.appendChild(el(`<div class="errbox"></div>`)).textContent = text;
          scrollDown();
        }

        function toolHint(toolName, input) {
          if (toolName === 'bash') return input.command || '';
          if (toolName === 'web_search') return input.query || '';
          if (toolName === 'create_presentation')
            return `${input.filename || ''} · ${(input.slides || []).length} slides`;
          return input.path || input.url || JSON.stringify(input).slice(0, 120);
        }

        function addTool(toolName, input) {
          const n = el(
            `<details class="tool"><summary><span class="dot"></span><span class="tname"></span><span class="thint"></span></summary><pre></pre></details>`,
          );
          n.querySelector('.tname').textContent = toolName;
          n.querySelector('.thint').textContent = toolHint(toolName, input);
          n.querySelector('pre').textContent = JSON.stringify(input, null, 2).slice(0, 3000);
          thread.appendChild(n);
          scrollDown();
          return n;
        }

        function emptyState() {
          thread.innerHTML = '';
          const hints = (HINTS[mode] || []).map((h) => `<div class="hint">${h}</div>`).join('');
          const n = el(
            `<div id="empty"><h2>What are we doing today?</h2><div>mode: <b>${mode}</b> — routed through your free-model gateway</div><div class="hints">${hints}</div></div>`,
          );
          n.querySelectorAll('.hint').forEach(
            (h) =>
              (h.onclick = () => {
                $('input').value = h.textContent;
                $('input').focus();
              }),
          );
          thread.appendChild(n);
        }

        // ---- send / SSE ----
        async function send() {
          const text = $('input').value.trim();
          if (!text || busy) return;
          busy = true;
          $('send').disabled = true;
          $('input').value = '';
          const empty = document.getElementById('empty');
          if (empty) empty.remove();
          addUser(text);
          const statusN = el(
            `<div class="status-line"><div class="spinner"></div><span>thinking…</span></div>`,
          );
          thread.appendChild(statusN);
          scrollDown();
          let lastTool = null;

          try {
            const res = await fetch('/api/agent', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                sessionId,
                mode,
                message: text,
                workspace: $('workspace').value.trim() || undefined,
                autoApprove: $('autoApprove').checked,
              }),
            });
            const reader = res.body.getReader();
            const dec = new TextDecoder();
            let buf = '';
            for (;;) {
              const { done, value } = await reader.read();
              if (done) break;
              buf += dec.decode(value, { stream: true });
              let idx;
              while ((idx = buf.indexOf('\n\n')) >= 0) {
                const chunk = buf.slice(0, idx);
                buf = buf.slice(idx + 2);
                if (!chunk.startsWith('data: ')) continue;
                const ev = JSON.parse(chunk.slice(6));
                handleEvent(ev);
              }
            }
          } catch (e) {
            addError('connection error: ' + e.message);
          }
          statusN.remove();
          busy = false;
          $('send').disabled = false;
          loadSessions();

          function handleEvent(ev) {
            thread.insertBefore(statusN, null); // keep spinner last
            if (ev.type === 'session') {
              sessionId = ev.id;
            } else if (ev.type === 'text') {
              statusN.remove();
              addAssistant(ev.text);
              thread.appendChild(statusN);
            } else if (ev.type === 'tool_start') {
              statusN.querySelector('span').textContent = `running ${ev.tool}…`;
              lastTool = addTool(ev.tool, ev.input);
              thread.appendChild(statusN);
            } else if (ev.type === 'tool_result') {
              if (lastTool) {
                lastTool.classList.add(ev.ok ? 'ok' : 'err');
                lastTool.querySelector('pre').textContent = ev.output || '(no output)';
              }
              if (ev.downloadUrl) {
                thread.appendChild(
                  el(`<a class="dl" href="${ev.downloadUrl}">⬇ Download presentation</a>`),
                );
              }
              statusN.querySelector('span').textContent = 'thinking…';
              scrollDown();
            } else if (ev.type === 'approval_request') {
              statusN.querySelector('span').textContent = 'waiting for your approval…';
              const a = el(
                `<div class="approval" data-id="${ev.id}"><div class="q">Allow <b>${ev.tool}</b>?</div><pre></pre><button class="yes">Allow</button><button class="no">Deny</button></div>`,
              );
              a.querySelector('pre').textContent =
                ev.tool === 'bash'
                  ? ev.input.command || ''
                  : JSON.stringify(ev.input, null, 2).slice(0, 2000);
              const decide = (approved) => {
                fetch('/api/approve', {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ id: ev.id, approved }),
                });
                a.classList.add('resolved');
              };
              a.querySelector('.yes').onclick = () => decide(true);
              a.querySelector('.no').onclick = () => decide(false);
              thread.insertBefore(a, statusN);
              scrollDown();
            } else if (ev.type === 'approval_resolved') {
              const a = thread.querySelector(`.approval[data-id="${ev.id}"]`);
              if (a) {
                a.classList.add('resolved');
                a.querySelector('.q').textContent += ev.approved ? ' — allowed' : ' — denied';
              }
              statusN.querySelector('span').textContent = 'thinking…';
            } else if (ev.type === 'error') {
              addError(ev.message);
            }
            scrollDown();
          }
        }

        // ---- sessions sidebar ----
        async function loadSessions() {
          const list = await (await fetch('/api/sessions')).json();
          const box = $('sessList');
          box.innerHTML = '';
          for (const s of list) {
            const n = el(
              `<div class="sess ${s.id === sessionId ? 'active' : ''}"><span class="m">${s.mode.slice(0, 5)}</span><span class="t"></span><span class="del">✕</span></div>`,
            );
            n.querySelector('.t').textContent = s.title;
            n.onclick = () => openSession(s.id);
            n.querySelector('.del').onclick = async (e) => {
              e.stopPropagation();
              await fetch(`/api/sessions/${s.id}`, { method: 'DELETE' });
              if (s.id === sessionId) newSession();
              loadSessions();
            };
            box.appendChild(n);
          }
        }

        async function openSession(id) {
          const s = await (await fetch(`/api/sessions/${id}`)).json();
          sessionId = s.id;
          setMode(s.mode, false);
          if (s.workspace) $('workspace').value = s.workspace;
          thread.innerHTML = '';
          for (const m of s.messages) {
            if (m.role === 'user') {
              if (typeof m.content === 'string') addUser(m.content);
              // tool_result turns are internal — skip re-rendering them
            } else if (Array.isArray(m.content)) {
              for (const b of m.content) {
                if (b.type === 'text' && b.text) addAssistant(b.text);
                else if (b.type === 'tool_use') {
                  const t = addTool(b.name, b.input || {});
                  t.classList.add('ok');
                }
              }
            }
          }
          loadSessions();
          scrollDown();
        }

        function newSession() {
          sessionId = null;
          emptyState();
          loadSessions();
        }

        // ---- mode switching ----
        function setMode(m, reset = true) {
          mode = m;
          document
            .querySelectorAll('.mode')
            .forEach((x) => x.classList.toggle('active', x.dataset.mode === m));
          $('modeTag').textContent = m;
          $('wsRow').style.display = m === 'agentic' ? 'flex' : 'none';
          if (reset) newSession();
        }
        document
          .querySelectorAll('.mode')
          .forEach((x) => (x.onclick = () => setMode(x.dataset.mode)));
        $('newBtn').onclick = newSession;

        // ---- quota widget ----
        async function loadQuota() {
          try {
            const d = await (await fetch('/api/kompass-status')).json();
            const rows = Object.entries(d.providers || {})
              .filter(([, p]) => p.enabled && p.has_key)
              .sort((a, b) => b[1].rpd.used / b[1].rpd.limit - a[1].rpd.used / a[1].rpd.limit)
              .slice(0, 5);
            $('quota').innerHTML =
              rows
                .map(([name, p]) => {
                  const pct = Math.min(100, Math.round((p.rpd.used / p.rpd.limit) * 100));
                  return `<div class="row"><span>${name}</span><span>${p.rpd.used}/${p.rpd.limit}</span></div><div class="bar"><i style="width:${pct}%"></i></div>`;
                })
                .join('') || 'no providers';
          } catch {
            $('quota').textContent = 'quota unavailable';
          }
        }

        // ---- input handling ----
        $('input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        });
        $('input').addEventListener('input', function () {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });
        $('send').onclick = send;

        // ---- boot ----
        fetch('/api/config')
          .then((r) => r.json())
          .then((c) => {
            $('workspace').value = c.workspaceDefault || '';
          });
        emptyState();
        loadSessions();
        loadQuota();
        setInterval(loadQuota, 30000);
      })();
    </script>
  </body>
</html>
