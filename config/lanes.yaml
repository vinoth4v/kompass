# Kompass lane table. Chain entries are "<provider>/<model>" (model may itself contain
# slashes, e.g. openrouter/poolside/laguna-s-2.1:free — split on FIRST slash only).
# All slugs verified live 2026-07-23:
#   - OpenRouter: GET openrouter.ai/api/v1/models (:free roster, tools=true)
#   - NVIDIA:     GET integrate.api.nvidia.com/v1/models
#   - Google:     GET generativelanguage.googleapis.com/v1beta/models
# allow_paid=false (guardrail §6.8): with a free-tier OpenRouter key only :free slugs
# are callable; NVIDIA Build and AI Studio keys are unbilled free-tier keys.
default_lane: AGENTIC
allow_paid: false

# M3 dispatcher (SPEC §4): fast free reasoning model returning a strict-JSON verdict.
# Model id verified live in the v1beta models list on 2026-07-23 (see DECISIONS.md);
# pinned rather than the gemini-flash-lite-latest alias to avoid surprise swaps.
# Dedicated dispatch model (2026-07-23): NOT present in any lane, so coding
# traffic can never starve the classifier's budget. Probed live: strict-JSON ✓.
dispatcher:
  model: google/gemini-3.1-flash-lite
  timeout_ms: 1500
  cache_ttl_s: 300
  confidence_floor: 0.6

# M5 privacy guard: requests matching any pattern are never sent to providers
# flagged trains_on_data: true (they fall through to non-training providers).
privacy:
  block_patterns:
    - '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
    - 'AKIA[0-9A-Z]{16}' # AWS access key id
    - 'ghp_[A-Za-z0-9]{36}' # GitHub PAT
    - 'sk-ant-[A-Za-z0-9-]{20,}' # Anthropic key
    - 'xox[bap]-[0-9A-Za-z-]{10,}' # Slack tokens
  block_globs:
    - '**/.env'
    - '**/id_rsa'
    - '**/credentials.json'
    - 'secrets/**'

# NVIDIA slugs verified live + probed invocable 2026-07-23 (second pass):
# poolside/laguna-xs-2.1, minimaxai/minimax-m3, nvidia/nemotron-3-ultra-550b-a55b,
# stepfun-ai/step-3.7-flash all answered; mistralai/mistral-medium-3.5-128b listed
# but cold/congested on probe (kept as tail fallback — cooldowns route around it).
# kimi-k2.6 still 404s ("Function not found for account") on this key → excluded.
# nemotron-3-embed-1b excluded: embeddings model, Claude Code sends chat traffic only.
lanes:
  # Groq (enabled 2026-07-23, tool-calling probed ✓): ultra-fast but free-tier TPM
  # is 6-12k, so it backs up FAST (quality-first: flash-lite leads; 8b answers vaguely as primary) and tails SIMPLE —
  # big contexts get rejected upstream and fall through the chain.
  FAST:
    - google/gemini-3.5-flash-lite
    - groq/llama-3.1-8b-instant
    - nvidia/stepfun-ai/step-3.7-flash
    - openrouter/poolside/laguna-xs-2.1:free
    - nvidia/nvidia/llama-3.3-nemotron-super-49b-v1

  SIMPLE:
    - openrouter/poolside/laguna-xs-2.1:free
    - nvidia/poolside/laguna-xs-2.1
    - nvidia/nvidia/llama-3.3-nemotron-super-49b-v1
    - groq/llama-3.3-70b-versatile
    - nvidia/mistralai/mistral-medium-3.5-128b
    - google/gemini-3.5-flash-lite

  # laguna-xs (nvidia) demoted below minimax 2026-07-23: repeatedly returned
  # truncated/empty streams during real sessions.
  AGENTIC:
    - openrouter/poolside/laguna-s-2.1:free
    - nvidia/minimaxai/minimax-m3
    - openrouter/poolside/laguna-xs-2.1:free
    - nvidia/z-ai/glm-5.2
    - nvidia/poolside/laguna-xs-2.1
    - google/gemini-3.6-flash

  HARD:
    - nvidia/deepseek-ai/deepseek-v4-pro
    - nvidia/minimaxai/minimax-m3
    - google/gemini-3.1-pro-preview
    - openrouter/poolside/laguna-s-2.1:free
    - nvidia/deepseek-ai/deepseek-v4-flash

  LONGCTX:
    - google/gemini-3.6-flash
    - nvidia/nvidia/nemotron-3-ultra-550b-a55b
    - nvidia/minimaxai/minimax-m3
    - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
