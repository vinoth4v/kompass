# Kompass lane table. Chain entries are "<provider>/<model>" (model may itself contain
# slashes, e.g. openrouter/poolside/laguna-s-2.1:free — split on FIRST slash only).
# All slugs verified live 2026-07-23:
#   - OpenRouter: GET openrouter.ai/api/v1/models (:free roster, tools=true)
#   - NVIDIA:     GET integrate.api.nvidia.com/v1/models
#   - Google:     GET generativelanguage.googleapis.com/v1beta/models
# allow_paid=false (guardrail §6.8): with a free-tier OpenRouter key only :free slugs
# are callable; NVIDIA Build and AI Studio keys are unbilled free-tier keys.
default_lane: AGENTIC
allow_paid: false

# M3 dispatcher (SPEC §4): fast free reasoning model returning a strict-JSON verdict.
# Model id verified live in the v1beta models list on 2026-07-23 (see DECISIONS.md);
# pinned rather than the gemini-flash-lite-latest alias to avoid surprise swaps.
# Dedicated dispatch model (2026-07-23): NOT present in any lane, so coding
# traffic can never starve the classifier's budget. Probed live: strict-JSON ✓.
dispatcher:
  model: google/gemini-3.1-flash-lite
  # Fallback classifiers released to lane work 2026-07-24 (user request): groq
  # llama-3.1-8b-instant (already FAST) and mistral-small-latest (now FAST) no
  # longer classify — their budgets serve real work instead. If the primary is
  # exhausted/down, routing falls back to heuristics (never blocks, defaults to
  # AGENTIC). Restore a `fallbacks:` list here if classifier coverage matters
  # more than those budgets.
  timeout_ms: 1500
  cache_ttl_s: 300
  confidence_floor: 0.6

# M5 privacy guard: requests matching any pattern are never sent to providers
# flagged trains_on_data: true (they fall through to non-training providers).
privacy:
  block_patterns:
    - '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
    - 'AKIA[0-9A-Z]{16}' # AWS access key id
    - 'ghp_[A-Za-z0-9]{36}' # GitHub PAT
    - 'sk-ant-[A-Za-z0-9-]{20,}' # Anthropic key
    - 'xox[bap]-[0-9A-Za-z-]{10,}' # Slack tokens
  block_globs:
    - '**/.env'
    - '**/id_rsa'
    - '**/credentials.json'
    - 'secrets/**'

# NVIDIA slugs verified live + probed invocable 2026-07-23 (second pass):
# poolside/laguna-xs-2.1, minimaxai/minimax-m3, nvidia/nemotron-3-ultra-550b-a55b,
# stepfun-ai/step-3.7-flash all answered; mistralai/mistral-medium-3.5-128b listed
# but cold/congested on probe (kept as tail fallback — cooldowns route around it).
# kimi-k2.6 still 404s ("Function not found for account") on this key → excluded.
# nemotron-3-embed-1b excluded: embeddings model, Claude Code sends chat traffic only.
#
# Design/creative candidates probed 2026-07-23 (third pass, tool-calling probe):
#   PASSED → added: openrouter/poolside/laguna-m.1:free (AGENTIC),
#     openrouter/nvidia/nemotron-3-super-120b-a12b:free (AGENTIC tail),
#     nvidia/mistralai/mistral-small-4-119b-2603 (SIMPLE).
#   EXCLUDED: nvidia qwen3.5-397b-a17b + writer/palmyra-creative-122b (404
#     "not found for account" on this key, same class as kimi-k2.6);
#     openrouter google/gemma-4-31b-it:free (persistent upstream 429 — free
#     capacity saturated); nvidia minimaxai/minimax-m2.7 (68s response — too
#     cold for interactive lanes; m3 already covers this family).
#   Vision models (nemotron-nano-12b-v2-vl:free, llama-3.2-90b-vision) tool-probe
#     ✓ — initially blocked on the provider-level multimodal flag; shipped
#     per-model `multimodal_models` in providers.yaml 2026-07-24 and wired both
#     as SIMPLE/HARD vision tails (google is no longer a multimodal SPOF).
#
# spread_top (2026-07-23): a lane's first pick is drawn by weighted-random from the
# top `spread_top` entries (weighted by each model's recent live success rate),
# not always chain[0]. Spreads load across comparable models under bursty/parallel
# use instead of hammering one model's RPM ceiling, and adapts as models degrade
# or recover without touching this file. FAST is pinned to spread_top:1 (strict
# chain[0] only) on purpose — promoting groq's 8b model there earlier caused
# vague/hedging answers even though it was healthy; quality, not just health,
# matters for that lane. See docs/DECISIONS.md.
lanes:
  FAST:
    spread_top: 1 # quality-first — do not spread (see rationale above)
    chain:
      - google/gemini-3.5-flash-lite
      - groq/llama-3.1-8b-instant
      # mistral-small released from classifier duty 2026-07-24 — fast small
      # generalist, natural FAST fit (JSON-mode probed ✓ 2026-07-23).
      - mistral/mistral-small-latest
      - nvidia/stepfun-ai/step-3.7-flash
      - cfai/@cf/meta/llama-3.3-70b-instruct-fp8-fast
      - openrouter/poolside/laguna-xs-2.1:free
      - nvidia/nvidia/llama-3.3-nemotron-super-49b-v1

  SIMPLE:
    spread_top: 2 # top two are roughly comparable single-file coders
    chain:
      - openrouter/poolside/laguna-xs-2.1:free
      - nvidia/poolside/laguna-xs-2.1
      - mistral/codestral-2508
      - nvidia/nvidia/llama-3.3-nemotron-super-49b-v1
      # mistral-small-4 added 2026-07-23: tool-probed ✓ (~670ms); frontend/creative
      # all-rounder for webdesign-flavoured SIMPLE traffic.
      - nvidia/mistralai/mistral-small-4-119b-2603
      - sambanova/Meta-Llama-3.3-70B-Instruct
      - groq/llama-3.3-70b-versatile
      - nvidia/mistralai/mistral-medium-3.5-128b
      - google/gemini-3.5-flash-lite
      # second multimodal entry (google provider counter, not flash-lite's): a
      # transient flash-lite failure must not exhaust every lane for PDF/image
      # requests, which only multimodal models can serve.
      - google/gemini-3.6-flash
      # non-google vision fallback (multimodal_models in providers.yaml) so a
      # google outage/quota-out no longer exhausts SIMPLE for image/PDF requests.
      - openrouter/nvidia/nemotron-nano-12b-v2-vl:free

  # laguna-xs (nvidia) demoted below minimax 2026-07-23: repeatedly returned
  # truncated/empty streams during real sessions.
  AGENTIC:
    spread_top: 2 # laguna-s and minimax-m3 are both proven strong agentic coders
    chain:
      - openrouter/poolside/laguna-s-2.1:free
      - nvidia/minimaxai/minimax-m3
      # laguna-m.1 added 2026-07-23 (design/frontend/game-code pass): larger laguna
      # sibling, tool-probed ✓ (2.8s, first probe hit a transient upstream 429).
      # Deliberately below the proven spread pair — promote into the spread only
      # after real-session validation (see docs/DECISIONS.md).
      - openrouter/poolside/laguna-m.1:free
      - mistral/devstral-medium-latest
      - openrouter/poolside/laguna-xs-2.1:free
      - nvidia/z-ai/glm-5.2
      - nvidia/poolside/laguna-xs-2.1
      - hf/Qwen/Qwen3-Coder-Next
      # nemotron-3-super-120b added 2026-07-23: tool-probed ✓ (~300ms), 262k ctx,
      # solid webdesign/game-code fallback depth on the openrouter RPD budget.
      - openrouter/nvidia/nemotron-3-super-120b-a12b:free
      - google/gemini-3.6-flash

  HARD:
    # gpt-4.1 (github) is scarce (~50/day); spreading with deepseek-v4-pro (both
    # excellent, comparable) conserves that quota instead of exhausting it daily.
    spread_top: 2
    chain:
      - github/openai/gpt-4.1
      - nvidia/deepseek-ai/deepseek-v4-pro
      - sambanova/DeepSeek-V3.2
      - nvidia/minimaxai/minimax-m3
      - google/gemini-3.1-pro-preview
      - openrouter/poolside/laguna-s-2.1:free
      - nvidia/deepseek-ai/deepseek-v4-flash
      # multimodal fallback: gemini-3.1-pro is scarce (2 rpm / 50 rpd) — PDF/image
      # requests on HARD need a second multimodal option before exhausting.
      - google/gemini-3.6-flash
      # non-google vision fallback (multimodal_models in providers.yaml); slow
      # (~8s probe) but keeps HARD alive for image/PDF when google is out.
      - nvidia/meta/llama-3.2-90b-vision-instruct

  LONGCTX:
    spread_top: 2 # both leads are 1M-context models of comparable quality
    # github/openai/gpt-4.1 removed 2026-07-23: hard-capped at 8000 tokens per
    # request on the free Models tier ("Request body too large... Max size: 8000
    # tokens") — structurally incompatible with this lane (heuristic threshold is
    # >60k tokens), so every real LONGCTX request would fail on it. Kept in HARD
    # only, where request sizes are normally well under that cap.
    chain:
      - google/gemini-3.6-flash
      - nvidia/nvidia/nemotron-3-ultra-550b-a55b
      - nvidia/minimaxai/minimax-m3
      - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free

# Non-chat capabilities (2026-07-24): each is an ordered fallback chain over the
# same providers/ledger. Upstream shapes live-probed before wiring — flux returns
# JSON b64, SDXL returns raw PNG bytes, bge-m3 native run, gemini batchEmbed.
# Excluded after probing: nvidia baai/bge-m3 (account-gated "Something went
# wrong"), google gemini-3.1-flash-image (429 "check your plan" on free tier),
# cfai flux-2-klein (requires multipart input — not worth a third body shape).
images:
  chain:
    - cfai/@cf/black-forest-labs/flux-1-schnell
    - cfai/@cf/bytedance/stable-diffusion-xl-lightning

# NOTE for clients: vector dimensions differ per model (bge-m3: 1024,
# gemini-embedding-001: 3072). A vector store needs stable dims — if you index
# with one model, don't let a fallback silently switch dims mid-corpus; the
# response's `model` field says which entry served each request.
embeddings:
  chain:
    - cfai/@cf/baai/bge-m3
    - google/gemini-embedding-001
