# Kompass provider registry. All model IDs live here or in lanes.yaml — never in code
# (BUILD_PLAN §6.5). Limits: verified live where possible, else conservative + TODO(verify).
providers:
  # ── Get a free key: https://openrouter.ai/keys ──────────────────────────────
  # Sign in (GitHub/Google works) → "Create Key" → copy the sk-or-v1-… value into
  # secrets/.secrets.json as OPENROUTER_API_KEY. No credit card needed; buying $10
  # of credits once raises :free models from 50 to 1000 requests/day.
  openrouter:
    kind: openai
    base_url: https://openrouter.ai/api/v1
    key_env: OPENROUTER_API_KEY
    # OpenRouter free endpoints may train on prompts; treat as training-on-data for
    # the M5 privacy guard (conservative; per docs some :free endpoints train).
    trains_on_data: true
    # Verified 2026-07-23 at openrouter.ai/docs/api-reference/limits, free-tier key
    # (<10 credits purchased): 20 RPM, 50 RPD. Rises to 1000 RPD with 10+ credits.
    limits: { rpm: 20, rpd: 50 }

  # ── Get a free key: https://build.nvidia.com ────────────────────────────────
  # Create an NVIDIA account → open any model page → "Get API Key" → copy the
  # nvapi-… value into secrets/.secrets.json as NVIDIA_API_KEY. Free tier, no card.
  nvidia:
    kind: openai
    base_url: https://integrate.api.nvidia.com/v1
    key_env: NVIDIA_API_KEY
    trains_on_data: false
    # TODO(verify): NVIDIA Build commonly documents 40 RPM per key; RPD not published.
    # Conservative per-key values; per-key vs per-model is an open SPEC §8 question.
    limits: { rpm: 40, rpd: 5000 }

  # ── Get a free key: https://aistudio.google.com/apikey ─────────────────────
  # Sign in with a Google account → "Create API key" → copy the AIza… value into
  # secrets/.secrets.json as GOOGLE_AI_KEY. Your live free-tier limits are shown at
  # https://aistudio.google.com/rate-limit (update the numbers below to match).
  google:
    kind: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    key_env: GOOGLE_AI_KEY
    trains_on_data: false
    # TODO(verify): ai.google.dev no longer publishes free-tier numbers (dashboard-only,
    # needs browser). Conservative defaults; per-model overrides below.
    limits: { rpm: 10, rpd: 500 }
    model_limits:
      gemini-3.1-pro-preview: { rpm: 2, rpd: 50 }
      # classifier: SPEC cites ~1,500/day free for flash-lite; TODO(verify) exact
      # current numbers in the AI Studio dashboard (not published in docs anymore).
      gemini-3.5-flash-lite: { rpm: 15, rpd: 1000 }
      # dedicated dispatcher model — own counter, no coding lane uses it
      gemini-3.1-flash-lite: { rpm: 15, rpd: 1000 }

  # ── Get a free key: https://console.groq.com/keys ──────────────────────────
  # Create a Groq account → "Create API Key" → copy the gsk_… value into
  # secrets/.secrets.json as GROQ_API_KEY. Free tier, no card.
  groq:
    kind: openai
    base_url: https://api.groq.com/openai/v1
    key_env: GROQ_API_KEY
    enabled: true
    trains_on_data: false
    # Verified 2026-07-23 via x-ratelimit-limit-requests response headers (per-day):
    # llama-3.3-70b/gpt-oss-120b 1000 RPD, llama-3.1-8b-instant 14400 RPD.
    # TPM is tiny on free tier (6-12k) → Groq suits small-context lanes; oversized
    # requests get rejected upstream and fall through the chain. rpm TODO(verify).
    limits: { rpm: 30, rpd: 1000 }
    model_limits:
      llama-3.1-8b-instant: { rpm: 30, rpd: 14400 }
